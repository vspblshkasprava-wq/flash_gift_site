<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'none'; connect-src 'none'; img-src 'self' data:; font-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none';">
  <title>Flash — проверка оплаты</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #1f1a17;
      background: #fff8f1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-width: 320px;
      min-height: 100vh;
      min-height: 100svh;
      margin: 0;
      background:
        radial-gradient(circle at top, rgba(231, 120, 23, 0.12), transparent 42%),
        #fff8f1;
    }

    main {
      min-height: 100vh;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 32px 20px;
    }

    .card {
      width: 100%;
      max-width: 560px;
      padding: 40px;
      text-align: center;
      background: #ffffff;
      border: 1px solid rgba(31, 26, 23, 0.08);
      border-radius: 24px;
      box-shadow: 0 18px 48px rgba(70, 42, 18, 0.1);
    }

    .wordmark {
      margin: 0 0 28px;
      color: #e77817;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.18em;
    }

    .status-icon {
      display: grid;
      width: 72px;
      height: 72px;
      margin: 0 auto 24px;
      place-items: center;
      color: #e77817;
      background: #fff2e5;
      border-radius: 50%;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(26px, 6vw, 36px);
      line-height: 1.15;
      letter-spacing: -0.025em;
    }

    p {
      margin: 0;
      color: #544b45;
      font-size: 17px;
      line-height: 1.6;
    }

    .note {
      margin-top: 12px;
      font-size: 15px;
    }

    .home-link {
      display: inline-flex;
      min-height: 48px;
      margin-top: 30px;
      padding: 12px 24px;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-weight: 700;
      text-decoration: none;
      background: #e77817;
      border-radius: 14px;
    }

    .home-link:hover {
      background: #c95e0a;
    }

    .home-link:focus,
    .home-link:focus-visible {
      outline: 3px solid #1F1A17;
      outline-offset: 4px;
      box-shadow: 0 0 0 5px rgba(231, 120, 23, 0.28);
    }

    @media (max-width: 480px) {
      main {
        padding: 20px 14px;
      }

      .card {
        padding: 32px 22px;
        border-radius: 20px;
      }

      .home-link {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="card" aria-labelledby="payment-heading">
      <p class="wordmark">FLASH</p>
      <div class="status-icon" aria-hidden="true">
        <svg aria-hidden="true" focusable="false" width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="20" r="14" stroke="currentColor" stroke-width="3"/>
          <path d="M20 12V20L25 23" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1 id="payment-heading">Оплата передана на обработку</h1>
      <p>Вернитесь в приложение Flash и нажмите «Проверить оплату». Статус заказа обновится после подтверждения банком.</p>
      <p class="note">Эту страницу можно закрыть.</p>
      <a class="home-link" href="/">На главную</a>
    </section>
  </main>
</body>
</html>
