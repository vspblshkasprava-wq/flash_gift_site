<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="robots" content="noindex,nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#9a9a9a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Клавиатура">
    <link rel="manifest" href="../manifest.webmanifest">
    <link rel="apple-touch-icon" href="../assets/icons/apple-touch-icon.png">
    <title>Клавиатура для малыша</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main id="menu" class="menu">
      <section class="panel" aria-labelledby="title">
        <a class="back-link" href="../index.html">Назад</a>
        <p class="eyebrow">Клавиатура</p>
        <h1 id="title">Чистый экран</h1>
        <p class="lead">На игровом экране остается только крупный символ. Все цвета задаются здесь.</p>

        <div class="settings">
          <label class="color-control">
            <span>Цвет фона</span>
            <input id="backgroundColor" type="color" value="#9a9a9a">
          </label>

          <label class="color-control">
            <span>Цвет буквы</span>
            <input id="letterColor" type="color" value="#000000">
          </label>
        </div>

        <section class="locations" aria-labelledby="locations-title">
          <h2 id="locations-title">Локация</h2>
          <div id="locationList" class="location-list"></div>
        </section>

        <div class="actions">
          <button id="startGame" class="primary-button" type="button">Старт</button>
          <p class="hint">Выход: Ctrl + X или удержать правый верхний угол.</p>
        </div>
      </section>
    </main>

    <section id="game" class="game hidden" aria-label="Игровой экран">
      <div id="glyph" class="glyph" aria-hidden="true">8</div>
      <div id="exitZone" class="exit-zone" aria-hidden="true"></div>
    </section>

    <script src="../assets/deployment-storage.js"></script>
    <script src="game.js"></script>
  </body>
</html>
